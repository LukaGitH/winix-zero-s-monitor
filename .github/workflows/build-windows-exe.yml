name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    paths:
      - "winix_monitor_v*.py"
      - ".github/workflows/build-windows-exe.yml"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install pyinstaller pyserial matplotlib

      - name: Build executable
        run: python -m PyInstaller --onefile --windowed --name WinixMonitor_v28 winix_monitor_v28.py

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: WinixMonitor_v28
          path: dist/WinixMonitor_v28.exe
